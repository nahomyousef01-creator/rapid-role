name: Scrape Agency Jobs

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 6am UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Jobs Bot"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs data [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
